apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: cilium
  listeners:
    # Main lab domain
    - name: http
      protocol: HTTP
      port: 80
      hostname: lab.sofianedjerbi.com
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: lab.sofianedjerbi.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: lab-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All
    # Loki/Grafana subdomain
    - name: loki-http
      protocol: HTTP
      port: 80
      hostname: loki.lab.sofianedjerbi.com
      allowedRoutes:
        namespaces:
          from: All
    - name: loki-https
      protocol: HTTPS
      port: 443
      hostname: loki.lab.sofianedjerbi.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: loki-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All
    # n8n subdomain
    - name: n8n-http
      protocol: HTTP
      port: 80
      hostname: n8n.lab.sofianedjerbi.com
      allowedRoutes:
        namespaces:
          from: All
---
# Separate Gateway for ArgoCD TLS passthrough
# Cilium has a bug where mixing TLSRoute-only listeners with HTTPRoute listeners
# breaks HTTPRoute attachment: https://github.com/cilium/cilium/issues/28186
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: argocd-gateway
  namespace: default
spec:
  gatewayClassName: cilium
  listeners:
    - name: argo-tls
      protocol: TLS
      port: 443
      hostname: argo.lab.sofianedjerbi.com
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: All
        kinds:
          - kind: TLSRoute
