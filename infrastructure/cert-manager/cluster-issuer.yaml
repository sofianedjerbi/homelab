apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: contact@sofianedjerbi.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      # Solver for main lab domain
      - selector:
          dnsNames:
            - lab.sofianedjerbi.com
        http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: main-gateway
                namespace: default
                kind: Gateway
                sectionName: http
      # Solver for loki subdomain
      - selector:
          dnsNames:
            - loki.lab.sofianedjerbi.com
        http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: main-gateway
                namespace: default
                kind: Gateway
                sectionName: loki-http
      # Solver for n8n subdomain
      - selector:
          dnsNames:
            - n8n.lab.sofianedjerbi.com
        http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: main-gateway
                namespace: default
                kind: Gateway
                sectionName: n8n-http
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-tls
  namespace: default
spec:
  secretName: lab-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - lab.sofianedjerbi.com
