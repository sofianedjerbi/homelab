global:
  domain: argo.lab.sofianedjerbi.com

configs:
  params:
    # TLS enabled for native gRPC support (Cilium Gateway uses TLS passthrough)
    server.insecure: false

server:
  # Use cert-manager to generate a valid certificate for the domain
  certificate:
    enabled: true
    domain: argo.lab.sofianedjerbi.com
    issuer:
      group: cert-manager.io
      kind: ClusterIssuer
      name: letsencrypt-prod
  service:
    type: ClusterIP  # Will be exposed via Cilium Gateway API
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

controller:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
