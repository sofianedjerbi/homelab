apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-http-route
  namespace: argocd
spec:
  hostnames:
    - lab.sofianedjerbi.com
  parentRefs:
    - name: main-gateway
      namespace: default
  rules:
    # UI and REST API - keep /argo prefix
    - matches:
        - path:
            type: PathPrefix
            value: /argo
      backendRefs:
        - name: argocd-server
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: argocd-grpc-route
  namespace: argocd
spec:
  hostnames:
    - lab.sofianedjerbi.com
  parentRefs:
    - name: main-gateway
      namespace: default
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
