apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  hostnames:
    - lab.sofianedjerbi.com
  parentRefs:
    - name: main-gateway
      namespace: default
  rules:
    # gRPC API calls - rewrite /argo/xxx.yyyService to /xxx.yyyService
    - matches:
        - path:
            type: RegularExpression
            value: /argo/[a-z]+\.[A-Z][a-zA-Z]+Service.*
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: argocd-server
          port: 80
    # UI and other paths - no rewrite
    - matches:
        - path:
            type: PathPrefix
            value: /argo
      backendRefs:
        - name: argocd-server
          port: 80
