apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-http-route
  namespace: argocd
spec:
  hostnames:
    - lab.sofianedjerbi.com
  parentRefs:
    - name: main-gateway
      namespace: default
  rules:
    # gRPC-web calls - strip /argo prefix since ArgoCD gRPC doesn't respect rootpath
    - matches:
        - path:
            type: PathPrefix
            value: /argo/
          headers:
            - name: Content-Type
              value: application/grpc-web
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: argocd-server
          port: 80
    # gRPC-web+proto calls - strip /argo prefix
    - matches:
        - path:
            type: PathPrefix
            value: /argo/
          headers:
            - name: Content-Type
              value: application/grpc-web+proto
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: argocd-server
          port: 80
    # UI and REST API - keep /argo prefix
    - matches:
        - path:
            type: PathPrefix
            value: /argo
      backendRefs:
        - name: argocd-server
          port: 80
