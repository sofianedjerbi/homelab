apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-http-route
  namespace: argocd
spec:
  hostnames:
    - argo.lab.sofianedjerbi.com
  parentRefs:
    - name: main-gateway
      namespace: default
  rules:
    # Simple route - ArgoCD serves at root on its own subdomain
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
