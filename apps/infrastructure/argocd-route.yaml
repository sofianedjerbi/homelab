apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  hostnames:
    - lab.sofianedjerbi.com
  parentRefs:
    - name: main-gateway
      namespace: default
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /argo
      backendRefs:
        - name: argocd-server
          port: 80
